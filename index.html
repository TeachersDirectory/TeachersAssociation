const list = document.getElementById('list');
const search = document.getElementById('search');

function render(filteredData){
    list.innerHTML = "";
    filteredData.forEach((item,index)=>{
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
        <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
            <div class="serial">${index+1}.</div>
            <div class="info">
                <div class="role">${item[0]}</div>
                <div class="name">${item[1]}</div>
                <div class="post">${item[2]}</div>
                <div class="school">${item[3]}</div>
            </div>
        </div>
        <a class="call-btn" href="tel:${item[4]}">📞</a>
        `;

        list.appendChild(div);
    });
}

render(data);

search.addEventListener('input',()=>{
    const value = search.value.toLowerCase();
    const filtered = data.filter(item =>
        item[0].toLowerCase().includes(value) ||
        item[1].toLowerCase().includes(value) ||
        item[3].toLowerCase().includes(value)
    );
    render(filtered);
});
